# request-activation.yml — Unity Personal license activation helper (#83)
#
# One-time helper to obtain a Unity Personal license file (.ulf) for the CI runner.
# Workflow_dispatch-only — never auto-runs. Re-used annually for Personal license
# renewal (Unity Personal licenses expire ~1 year after activation).
#
# Procedure (also recorded in docs/findings/0050-ci-shippable-build-pipeline.md §6.Step 2):
#   1. Trigger this workflow:  gh workflow run request-activation.yml
#   2. Download the Unity_v6000.x.alf artifact from the workflow run
#   3. Upload the .alf to https://license.unity3d.com/manual (sign in with Unity ID)
#   4. Receive .ulf in browser → paste its full content into repo secret UNITY_LICENSE
#   5. Do NOT delete this workflow — re-run it next year for license renewal
#
# Why this lives in the repo (rather than being a one-off):
# - Personal license expires ~yearly; this is a known recurring event, not YAGNI.
# - Keeping the helper in tree means the renewal procedure is reproducible without
#   having to remember which action version / Unity version to pin.

name: Request Unity license activation file

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  request:
    name: Request .alf
    runs-on: ubuntu-latest   # The activation request is OS-independent; ubuntu is cheap.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Unity version from ProjectSettings/ProjectVersion.txt
        id: unity-version
        shell: bash
        run: |
          version=$(grep '^m_EditorVersion:' ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved Unity version: $version"

      - name: Request activation file
        uses: game-ci/unity-request-activation-file@v2
        id: getManualLicenseFile
        with:
          unityVersion: ${{ steps.unity-version.outputs.version }}

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.getManualLicenseFile.outputs.filePath }}
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 7   # short retention: secret material adjacent

      - name: Print activation instructions
        shell: bash
        # NOT a here-doc: bash here-doc terminators must be at column 0, which is
        # incompatible with YAML's mandatory block-scalar indentation. Use grouped echo.
        env:
          ALF_PATH: ${{ steps.getManualLicenseFile.outputs.filePath }}
        run: |
          {
            echo '## Next steps (manual)'
            echo ''
            echo "1. Download the **${ALF_PATH}** artifact from this run."
            echo '2. Open <https://license.unity3d.com/manual> in a browser and sign in with the Unity ID'
            echo '   held in `UNITY_EMAIL` (account email: `sasaco@live.jp`).'
            echo '3. Upload the `.alf` file. The site returns a `.ulf` file.'
            echo '4. Open the `.ulf` and copy its **full content** into the GitHub repo secret'
            echo '   `UNITY_LICENSE` (overwrite the previous value if renewing).'
            echo '5. The CI shippable-build workflow will pick up the new license on its next run.'
            echo ''
            echo 'See `docs/findings/0050-ci-shippable-build-pipeline.md` §2.4.2 / §6 for full context.'
          } >> "$GITHUB_STEP_SUMMARY"
