# shippable-build.yml — CI shippable Windows64 build & draft Release publish (#83)
#
# Wraps Assets/Editor/BackcastShippableBuild.BuildWindows64 on a self-hosted Windows
# runner (owner's machine) and ships a Sigstore-attested zip to a draft GitHub Release.
# Authoritative design + rationale: docs/findings/0050-ci-shippable-build-pipeline.md.
#
# Runner pivot (2026-06-18 #83 onboarding):
#   Originally designed for `runs-on: windows-2022 + GameCI` but Unity 6 broke Personal
#   license activation on hosted runners (.alf flow deprecated, Unity manual web page
#   serial-only, entitlement XML MAC-bound). See ADR-0014 for the full trade-off.
#   We accept owner-machine state seepage; HITL gate + bundled cpython/venv hermetic
#   design (findings 0049 §2) compensate.
#
# Trigger map (findings 0050 §2.1 / Appendix A):
#   - push tags v*      → build + publish DRAFT Release (manual Publish click after HITL)
#   - workflow_dispatch → build + publish DRAFT Release (synthetic version) for ad-hoc HITL
#   - push main paths   → build + smoke ONLY (bit-rot detection)
#   - schedule weekly   → build + smoke ONLY + stale-draft monitor + runner health
#
# Smoke pattern (findings 0050 §2.7): GUI mode launch + log-poll + Stop-Process kill.
# Contract: WorkspaceEngineHost.cs:189 (// CONTRACT marker).

name: Shippable build (Windows64)

on:
  push:
    # Tag publish AND main-push bit-rot path. `paths` is ignored for tag refs.
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - '.github/workflows/shippable-build.yml'
      - 'Assets/Editor/BackcastShippableBuild.cs'
      - 'Assets/Scripts/S1Spike/PythonRuntimeLocator.cs'
      - 'Assets/Scripts/Live/WorkspaceEngineHost.cs'
      - 'python/uv.lock'
      - 'python/pyproject.toml'
  workflow_dispatch:
  schedule:
    # Monday 07:00 UTC = JST 16:00 月曜. 4 roles per findings 0050 §2.1.1 + ADR-0014:
    # license expiry watch (n/a after pivot), bit-rot, stale-draft, self-hosted runner health.
    - cron: '0 7 * * 1'

permissions:
  contents: write       # Release publish
  id-token: write       # attest-build-provenance Sigstore
  attestations: write   # attest-build-provenance

concurrency:
  # Cancel in-progress on re-tag / re-dispatch / rapid main push. Cron + dispatch
  # share the main-ref group; dispatch wins (cron retries next week).
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Self-hosted owner machine ships PowerShell 5.1 (no pwsh) with default
# ExecutionPolicy = Restricted. Override the shell at job level so:
#   -NoProfile skips loading the user's profile script (don't depend on its state)
#   -ExecutionPolicy Bypass lets the runner's temp .ps1 script execute
#   "& '{0}'" is the GH Actions convention for passing the generated script file
defaults:
  run:
    shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{0}'"

jobs:
  build:
    name: Build & smoke-gate shippable Windows64
    runs-on: [self-hosted, Windows, X64]   # ADR-0014: pivot from windows-2022
    timeout-minutes: 60                    # expected ~10-15 min on warm self-hosted

    steps:
      # ── Workspace cleanup (self-hosted persists between runs) ────────────
      # Library/ and python/.venv/ are KEPT (natural cache); transient build/dist/smoke
      # outputs are cleaned so stale state from a failed prior run can't poison this one.
      - name: Clean transient outputs
        run: |
          foreach ($p in @('build','dist','smoke-extract','release-body-verify.md')) {
            if (Test-Path $p) { Remove-Item -Recurse -Force $p -Confirm:$false }
          }
          Remove-Item smoke-try*.log -Force -ErrorAction SilentlyContinue
          Write-Host "Workspace cleaned (Library/ and python/.venv/ preserved)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false   # don't wipe Library/ or .venv/ — we want them as natural cache

      # ── Resolve artifact version ─────────────────────────────────────────
      - name: Resolve artifact version
        id: ver
        run: |
          $sha = "${{ github.sha }}".Substring(0,7)
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}"
          } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $v = "dispatch-${{ github.run_number }}-$sha"
          } elseif ("${{ github.event_name }}" -eq "schedule") {
            $v = "cron-$sha"
          } else {
            $v = "main-$sha"
          }
          # PS5.1 Out-File default is UTF-16 LE+BOM which corrupts GITHUB_OUTPUT — pass -Encoding utf8.
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "artifact version: $v"

      # ── Read Unity version + verify Editor installed ────────────────────
      - name: Read Unity version & verify Editor present
        id: unity
        run: |
          $line = Get-Content ProjectSettings/ProjectVersion.txt | Where-Object { $_ -match '^m_EditorVersion:' } | Select-Object -First 1
          $v = ($line -split '\s+')[1]
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $exe = "C:\Program Files\Unity\Hub\Editor\$v\Editor\Unity.exe"
          "unity_exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if (-not (Test-Path $exe)) {
            Write-Error "Unity Editor $v not installed at $exe (ADR-0014: self-hosted runner requires local Unity install)"
            exit 1
          }
          Write-Host "Unity version: $v  ($exe)"

      # ── Publish path gate (tag push or dispatch) ─────────────────────────
      - name: Determine publish path
        id: publish
        run: |
          $tag = "${{ github.ref_type }}" -eq "tag"
          $dispatch = "${{ github.event_name }}" -eq "workflow_dispatch"
          $will = $tag -or $dispatch
          "publish=$will" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "publish path: $will"

      # ── Materialize the bundled venv that BackcastShippableBuild copies ─
      # python/.venv/ persists between runs on self-hosted, so uv sync is incremental.
      #
      # Manual install instead of astral-sh/setup-uv@v5 because that action triggers
      # a libuv assertion failure on this self-hosted Windows runner during Node.js
      # cleanup ("Assertion failed: !(handle->flags & UV_HANDLE_CLOSING)" — observed
      # run #27758559601). uv install itself succeeded; the crash is post-install
      # tear-down inside the action. The official installer is a plain PowerShell
      # script with no Node.js involvement.
      - name: Setup uv (manual install)
        run: |
          if (Get-Command uv -ErrorAction SilentlyContinue) {
            Write-Host "uv already on PATH: $(uv --version)"
          } else {
            $uvBin = "$env:USERPROFILE\.local\bin"
            if (Test-Path "$uvBin\uv.exe") {
              Write-Host "uv present at $uvBin; adding to PATH"
            } else {
              Write-Host "Installing uv via official installer..."
              irm https://astral.sh/uv/install.ps1 | iex
            }
            Add-Content -Path $env:GITHUB_PATH -Value $uvBin -Encoding utf8
            Write-Host "uv installed: $(& $uvBin\uv.exe --version)"
          }

      - name: uv sync (materialize python/.venv)
        run: uv sync --frozen
        working-directory: python

      # ── Direct Unity build (no GameCI; ADR-0014 dispenses with it) ──────
      # The build script runs as an IPostprocessBuildWithReport, so the post-process
      # (cpython + engine + site-packages copy + compileall + manifest) lands as part
      # of the same Unity invocation.
      - name: Build (BackcastShippableBuild.BuildWindows64)
        run: |
          $unity = "${{ steps.unity.outputs.unity_exe }}"
          $log = "build/unity-build.log"
          New-Item -ItemType Directory -Force -Path build | Out-Null
          & $unity -batchmode -nographics -quit `
            -projectPath . `
            -buildTarget StandaloneWindows64 `
            -executeMethod BackcastShippableBuild.BuildWindows64 `
            -logFile $log
          $code = $LASTEXITCODE
          if ($code -ne 0) {
            Write-Error "Unity build failed exit=$code"
            if (Test-Path $log) { Get-Content $log -Tail 80 }
            exit $code
          }
          # Surface the BackcastShippableBuild log lines for quick triage.
          if (Test-Path $log) {
            Write-Host "--- BackcastShippableBuild post-process lines ---"
            Get-Content $log | Where-Object { $_ -match '\[BackcastShippableBuild\]' }
          }

      # ── Verify build output is where BackcastShippableBuild puts it ─────
      - name: Verify build output location
        run: |
          $exe = "build/windows64/backcast.exe"
          $manifest = "build/windows64/backcast_Data/StreamingAssets/PythonRuntime/runtime-manifest.json"
          if (-not (Test-Path $exe)) {
            Write-Error "BackcastShippableBuild did not produce $exe"
            Get-ChildItem build -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          if (-not (Test-Path $manifest)) {
            Write-Error "Post-process did not produce runtime-manifest.json at $manifest"
            exit 1
          }
          Write-Host "Build output verified at $exe"

      # ── Library size guard (findings 0050 §2.3.2 — still relevant on self-hosted) ─
      - name: Measure Library size (cap=8GB raw)
        run: |
          $size = (Get-ChildItem Library -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum / 1GB
          $sizeRounded = [math]::Round($size, 2)
          Write-Host "Library size: $sizeRounded GB"
          "library_size_gb=$sizeRounded" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($size -gt 8) {
            Write-Error "Library bloat: $sizeRounded GB exceeds 8GB raw cap"
            exit 1
          }

      # ── Assemble dist/ with the single-top-folder zip layout ────────────
      - name: Assemble dist
        id: assemble
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $stage = "dist/backcast-windows64-$v"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # Move so the zip extracts to a single named folder.
          Move-Item build/windows64 $stage
          $zip = "dist/backcast-windows64-$v.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -CompressionLevel Optimal
          "stage_dir=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_path=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Assembled: $zip"

      # ── SBOM: bundled Python venv only (Principle P2, findings 0050 §2.5) ─
      - name: Generate Python SBOM (CycloneDX)
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          uvx --from cyclonedx-bom cyclonedx-py environment python/.venv -o "dist/sbom-python-$v.cdx.json"

      # ── Stage 1: Zip integrity ──────────────────────────────────────────
      - name: Stage 1 — Zip integrity (re-extract)
        id: smoke-extract
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $zip = "${{ steps.assemble.outputs.zip_path }}"
          $out = "smoke-extract"
          Remove-Item -Recurse -Force $out -ErrorAction SilentlyContinue
          Expand-Archive -Path $zip -DestinationPath $out -Force
          $tree = Join-Path $out "backcast-windows64-$v"
          if (-not (Test-Path "$tree/backcast.exe")) {
            Write-Error "Stage 1 fail: backcast.exe missing from extracted zip"
            exit 1
          }
          "tree_dir=$tree" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Stage 1 PASS"

      # ── Stage 2: Manifest schema ────────────────────────────────────────
      - name: Stage 2 — Manifest schema
        run: |
          $tree = "${{ steps.smoke-extract.outputs.tree_dir }}"
          $manifestPath = Join-Path $tree "backcast_Data/StreamingAssets/PythonRuntime/runtime-manifest.json"
          if (-not (Test-Path $manifestPath)) { Write-Error "Stage 2 fail: runtime-manifest.json missing"; exit 1 }
          $m = Get-Content $manifestPath -Raw | ConvertFrom-Json
          if ($m.schema -ne 1) { Write-Error "schema drift: $($m.schema)"; exit 1 }
          if ($m.target -ne 'StandaloneWindows64') { Write-Error "target drift: $($m.target)"; exit 1 }
          $runtimeRoot = Split-Path $manifestPath -Parent
          foreach ($p in @($m.paths.cpython, $m.paths.project_root, $m.paths.venv_site_relative)) {
            $full = Join-Path $runtimeRoot $p
            if (-not (Test-Path $full)) { Write-Error "Stage 2 fail: manifest path missing: $p"; exit 1 }
          }
          Write-Host "Stage 2 PASS (cpython=$($m.cpython_version), built_at=$($m.built_at))"

      # ── Stage 3: Bundled venv import smoke ──────────────────────────────
      - name: Stage 3 — Bundled venv import
        run: |
          $tree = "${{ steps.smoke-extract.outputs.tree_dir }}"
          $py = Join-Path $tree "backcast_Data/StreamingAssets/PythonRuntime/cpython/python.exe"
          if (-not (Test-Path $py)) { Write-Error "Stage 3 fail: bundled python.exe missing"; exit 1 }
          & $py -c "import duckdb, marimo, pyarrow, sklearn, pandas, numpy, joblib, orjson, httpx, websockets, pydantic; print('venv-import OK')"
          if ($LASTEXITCODE -ne 0) { Write-Error "Stage 3 fail: import smoke (exit=$LASTEXITCODE)"; exit 1 }
          Write-Host "Stage 3 PASS"

      # ── Stage 4: Player GUI smoke (retry once, findings 0050 §2.7.4) ───
      # GUI mode: -batchmode would skip Python init per WorkspaceOwnership.ShouldClaim
      # (findings 0050 §4). Self-hosted runner has owner's desktop session, so GUI launch
      # is straightforward.
      - name: Stage 4 — Player GUI smoke (retry once)
        run: |
          $tree = "${{ steps.smoke-extract.outputs.tree_dir }}"
          $exe = Join-Path $tree "backcast.exe"
          if (-not (Test-Path $exe)) { Write-Error "Stage 4 fail: backcast.exe missing"; exit 1 }
          function Invoke-Smoke {
            param([string]$Tag)
            $log = "smoke-$Tag.log"
            Remove-Item $log -ErrorAction SilentlyContinue
            $proc = Start-Process $exe -ArgumentList "-logFile",$log -PassThru
            # CONTRACT in WorkspaceEngineHost.cs:189 — change there requires change here in the same PR.
            $contract = '\[WorkspaceEngineHost\] live-configured server built; main GIL-free; lanes polling\.'
            $deadline = (Get-Date).AddSeconds(90)
            $hit = $false
            while ((Get-Date) -lt $deadline) {
              if (Test-Path $log) {
                $content = Get-Content $log -Raw -ErrorAction SilentlyContinue
                if ($content -and ($content -match $contract)) { $hit = $true; break }
              }
              Start-Sleep -Milliseconds 500
            }
            try { Stop-Process -Id $proc.Id -Force -ErrorAction Stop } catch {}
            try { Wait-Process -Id $proc.Id -Timeout 10 -ErrorAction Stop } catch {}
            if ($hit) { Write-Host "smoke OK ($Tag)" }
            else {
              Write-Warning "smoke fail ($Tag) — log dump:"
              if (Test-Path $log) { Get-Content $log }
            }
            return $hit
          }
          if (Invoke-Smoke "try1") { exit 0 }
          Write-Warning "Player GUI smoke try1 failed; retrying once"
          if (Invoke-Smoke "try2") { exit 0 }
          Write-Error "Player GUI smoke failed twice"
          exit 1

      # ── Supplementary release assets (only when publishing) ──────────────
      - name: Generate SHA256SUMS + copy manifest
        if: steps.publish.outputs.publish == 'True'
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $tree = "${{ steps.smoke-extract.outputs.tree_dir }}"
          Copy-Item (Join-Path $tree "backcast_Data/StreamingAssets/PythonRuntime/runtime-manifest.json") "dist/runtime-manifest.json"
          $files = @(
            "dist/backcast-windows64-$v.zip",
            "dist/runtime-manifest.json",
            "dist/sbom-python-$v.cdx.json"
          )
          $lines = foreach ($f in $files) {
            $h = (Get-FileHash $f -Algorithm SHA256).Hash
            $name = Split-Path $f -Leaf
            "$($h.ToLower())  $name"
          }
          $lines | Set-Content "dist/SHA256SUMS.txt" -Encoding utf8
          Get-Content "dist/SHA256SUMS.txt"

      - name: Attest build provenance
        if: steps.publish.outputs.publish == 'True'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/backcast-windows64-${{ steps.ver.outputs.version }}.zip

      - name: Generate Release body (verify procedure)
        if: steps.publish.outputs.publish == 'True'
        # Built line-by-line rather than a here-string because PowerShell's `@"..."@`
        # requires `"@` at column 0, which is incompatible with YAML block scalar indentation.
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $repo = "${{ github.repository }}"
          $fence = [string][char]0x60 * 3
          $lines = @(
            "## Verification (run before extracting)",
            "",
            "$fence" + "pwsh",
            "gh release download $v -p '*.zip' -p 'SHA256SUMS.txt'",
            "Get-FileHash backcast-windows64-$v.zip -Algorithm SHA256",
            "# compare against SHA256SUMS.txt",
            "gh attestation verify backcast-windows64-$v.zip -R $repo",
            $fence,
            "",
            "The attestation proves the zip came from this exact workflow run on this exact commit.",
            "",
            "## Runtime requirements",
            "",
            "- Windows 10 64-bit",
            "- DuckDB data root must be supplied via env ``BACKCAST_JQUANTS_DUCKDB_ROOT`` per ADR-0006",
            "- No system Python install required (cpython bundled)",
            "- No VC++ Redistributable required (vcruntime DLLs bundled per findings 0049 §2.4)"
          )
          $lines | Set-Content release-body-verify.md -Encoding utf8

      - name: Create draft Release
        if: steps.publish.outputs.publish == 'True'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ startsWith(github.ref_name, 'v') && (contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.')) }}
          tag_name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body_path: release-body-verify.md
          append_body: true
          files: |
            dist/backcast-windows64-${{ steps.ver.outputs.version }}.zip
            dist/SHA256SUMS.txt
            dist/runtime-manifest.json
            dist/sbom-python-${{ steps.ver.outputs.version }}.cdx.json

      # ── Weekly cron monitor (stale-draft + runner health) ───────────────
      # Self-hosted runner health: the fact that we got HERE on a scheduled run means the
      # runner is alive. If the cron didn't fire at all (runner offline), GitHub will
      # show 'queued' indefinitely — owner notices via the Actions tab being empty.
      - name: Weekly cron monitor
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $fence = [string][char]0x60 * 3
          $summary = @()
          $summary += "## Weekly monitor (findings 0050 §7 + ADR-0014)"
          $cutoff = (Get-Date).AddDays(-7).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $jq = "[.[] | select(.draft and (.created_at < \`"$cutoff\`")) | {name, created_at, html_url}]"
          $stale = gh api "/repos/${{ github.repository }}/releases" --jq $jq
          $summary += "### Stale drafts (> 7 days)"
          $summary += "$fence" + "json"
          $summary += $stale
          $summary += $fence
          $summary += ""
          $summary += "### Self-hosted runner health"
          $summary += "This cron ran successfully → runner is alive and authenticated."
          $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      # ── Upload workflow artifacts (always, for debugging) ───────────────
      - name: Upload workflow artifacts (logs + smoke output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Run number suffix prevents 'artifact already exists' on re-tag / re-dispatch.
          name: shippable-build-${{ steps.ver.outputs.version }}-run${{ github.run_number }}
          path: |
            smoke-try*.log
            build/unity-build.log
            dist/runtime-manifest.json
          retention-days: 14
          if-no-files-found: ignore
