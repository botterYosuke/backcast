[project]
name = "backcast-engine"
version = "0.0.0"
description = "Ported TTWR replay engine running under Unity Mono+pythonnet (S1 / issue #9)"
requires-python = ">=3.13,<3.14"
dependencies = [
    "nautilus-trader==1.226.0",
    "orjson>=3.11.9",
    "pydantic>=2.13.4",
    "httpx>=0.27",
    "websockets>=16.0",
    "joblib>=1.5.3",
    "scikit-learn>=1.8.0",
    "numpy>=2.4.4",
    "pandas>=2.3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["engine"]
